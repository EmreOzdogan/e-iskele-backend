services:
  eiskele-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # ASP.NET Core environment
      - ASPNETCORE_ENVIRONMENT=Production
      # Database
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      # JWT
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-EIskele.Api}
      - Jwt__Audience=${JWT_AUDIENCE:-EIskele.Clients}
      - Jwt__AccessTokenMinutes=${JWT_ACCESS_TOKEN_MINUTES:-60}
      - Jwt__RefreshTokenDays=${JWT_REFRESH_TOKEN_DAYS:-7}
      # CORS (comma-separated allowed origins)
      - AllowedOrigins=${ALLOWED_ORIGINS:-https://admin.e-iskele.com,https://kaptanhub.e-iskele.com,https://www.e-iskele.com}
      # Email
      - Email__SmtpHost=${SMTP_HOST}
      - Email__SmtpPort=${SMTP_PORT:-587}
      - Email__Username=${SMTP_USERNAME}
      - Email__Password=${SMTP_PASSWORD}
      - Email__SenderName=${SMTP_SENDER_NAME:-e-iskele}
      - Email__SenderEmail=${SMTP_SENDER_EMAIL}
    volumes:
      # Persistent storage for uploaded files
      - eiskele-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  eiskele-uploads:
    driver: local
